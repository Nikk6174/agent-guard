name: Deploy minimal runtime to Hugging Face Space

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Hugging Face Hub CLI
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Deploying selective files to Hugging Face Space..."
          
          # Upload only the agent_guard directory
          huggingface-cli upload DeathGun44/agent-guard agent_guard/ . \
            --repo-type space \
            --token $HF_TOKEN \
            --exclude "__pycache__/*" "*.pyc" "test_procedural.py" "inference.py" "inference_output.txt"
          
          # Upload the root config files (Dockerfile, README, etc)
          huggingface-cli upload DeathGun44/agent-guard Dockerfile . --repo-type space --token $HF_TOKEN
          huggingface-cli upload DeathGun44/agent-guard README.md . --repo-type space --token $HF_TOKEN
          
          echo "Deployment triggered successfully!"
