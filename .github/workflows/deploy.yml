name: Deploy minimal runtime to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Deploying selective files to Hugging Face Space using Python API..."
          
          cat << 'EOF' > deploy_hf.py
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          repo_id = "DeathGun44/agent-guard"
          
          print(f"Uploading core files to {repo_id}...")
          
          # Upload the entire repository mirror organically
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              delete_patterns="*",
              ignore_patterns=[
                  ".git*",
                  ".github/*",
                  "agent-guard-env/*",
                  "__pycache__/*", 
                  "*.pyc", 
                  "deploy_hf.py",
                  "README.md",
                  "requirements.txt",
                  "test_procedural.py", 
                  "inference_output.txt"
              ]
          )
          
          # Dynamically add Hugging Face YAML frontmatter to the README for the Space
          with open("README.md", "r") as f:
              original_readme = f.read()
              
          import textwrap
          hf_yaml = textwrap.dedent("""\
              ---
              title: AgentGuard Space
              emoji: 🛡️
              colorFrom: blue
              colorTo: indigo
              sdk: docker
              app_port: 7860
              ---
          """)
          with open("HF_README.md", "w") as f:
              f.write(hf_yaml + original_readme)
          
          # Upload dynamically generated README config
          api.upload_file(path_or_fileobj="HF_README.md", path_in_repo="README.md", repo_id=repo_id, repo_type="space")
          
          # Force push uv.lock to bypass any hidden HF Hub ignore rules
          api.upload_file(path_or_fileobj="uv.lock", path_in_repo="uv.lock", repo_id=repo_id, repo_type="space")
          
          print("Deployment triggered successfully!")
          EOF
          
          python deploy_hf.py
